name: Weekly Groww Pulse Report

on:
  schedule:
    # Runs at 02:30 UTC every Monday (which is 08:00 AM IST)
    - cron: '30 2 * * 1'
  workflow_dispatch: # Allows manual triggering from the GitHub UI

jobs:
  run-pulse:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          
      - name: Run Groww Pulse Agent
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          TARGET_DOC_ID: ${{ secrets.TARGET_DOC_ID }}
          STAKEHOLDER_EMAILS: ${{ secrets.STAKEHOLDER_EMAILS }}
          # Depending on how the Google Workspace MCP server is deployed,
          # you might need to add Google credentials to the environment here as well.
        run: |
          # PYTHONPATH is needed to allow python to find the 'src' module
          PYTHONPATH=. python src/main.py --product Groww --draft-only false
