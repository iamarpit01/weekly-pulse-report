name: Weekly Groww Pulse Report

on:
  schedule:
    # Runs at 16:30 UTC every day (which is 10:00 PM IST)
    - cron: '30 16 * * *'
  workflow_dispatch: # Allows manual triggering from the GitHub UI

jobs:
  run-pulse:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          
      - name: Create Google Credentials File
        env:
          GCP_SERVICE_ACCOUNT: ${{ secrets.GCP_SERVICE_ACCOUNT }}
        run: |
          echo "$GCP_SERVICE_ACCOUNT" > service_account.json
          
      - name: Run Groww Pulse Agent
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          TARGET_DOC_ID: ${{ secrets.TARGET_DOC_ID }}
          STAKEHOLDER_EMAILS: ${{ secrets.STAKEHOLDER_EMAILS }}
          GOOGLE_APPLICATION_CREDENTIALS: service_account.json
        run: |
          # PYTHONPATH is needed to allow python to find the 'src' module
          PYTHONPATH=. python src/main.py --product Groww --draft-only false
          
      - name: Commit and Push Updated Dashboard Data
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add frontend/public/data.json
          
          # Only commit and push if there are actual changes
          git diff --staged --quiet || (git commit -m "Automated Pulse Report: Update Dashboard Data [skip ci]" && git push)
